{% extends "base.html" %}
{% block title %}パスワード再設定 - かけいまもるくん{% endblock %}

{% block content %}
<style>
  .app-main { overflow-y: auto !important; }
</style>

<div style="display: flex; flex-direction: column; height: 100%; padding: 24px 20px;">

  <div style="text-align: center; margin-bottom: 24px; margin-top: 16px;">
    <h1 style="font-size: 1.3rem; font-weight: bold; color: #5d4037;">パスワードの再設定</h1>
    <p style="font-size: 0.85rem; color: #aaa; margin-top: 8px;">
      登録したメールアドレスを入力してください。<br>再設定用のリンクをお送りします。
    </p>
  </div>

  <form method="POST">
    {% csrf_token %}
    <div style="margin-bottom: 24px;">
      <label style="font-size: 0.85rem; color: #5d4037; font-weight: bold; display: block; margin-bottom: 6px;">
        メールアドレス
      </label>
      <input type="email" name="email" required
             style="width: 100%; padding: 12px 14px; border: 1px solid #ddd; border-radius: 10px; font-size: 0.95rem; box-sizing: border-box; outline: none;">
      {% if form.email.errors %}
      <div style="font-size: 0.8rem; color: #e74c3c; margin-top: 4px;">
        {{ form.email.errors }}
      </div>
      {% endif %}
    </div>

    <button type="submit"
            style="width: 100%; padding: 12px; background-color: #9c6d5c; color: white; border: none; border-radius: 50px; font-size: 1rem; font-weight: bold; cursor: pointer;">
      送信する
    </button>
  </form>

  <div style="text-align: center; margin-top: 16px;">
    <a href="{% url 'accounts:login' %}" style="font-size: 0.85rem; color: #aaa; text-decoration: none;">
      ログイン画面に戻る
    </a>
  </div>

</div>
{% endblock %}
