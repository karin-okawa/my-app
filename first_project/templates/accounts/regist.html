{% extends 'base.html' %}
{% block title %}新規登録 - かけいまもるくん{% endblock %}

{% block content %}
<style>
  .app-main { overflow-y: auto !important; }
</style>

<div style="display: flex; flex-direction: column; height: 100%; padding: 24px 20px;">

  <!-- タイトル -->
  <div style="text-align: center; margin-bottom: 24px; margin-top: 16px;">
    <h1 style="font-size: 1.5rem; font-weight: bold; color: #5d4037;">新規アカウント登録</h1>
  </div>

  <form method="POST">
    {% csrf_token %}
    {% for field in form %}
    <div style="margin-bottom: 16px;">
      <label style="font-size: 0.85rem; color: #5d4037; font-weight: bold; display: block; margin-bottom: 6px;">
        {{ field.label }}
      </label>
      {{ field }}
      {% if field.errors %}
      <div style="font-size: 0.8rem; color: #e74c3c; margin-top: 4px;">
        {{ field.errors }}
      </div>
      {% endif %}
    </div>
    {% endfor %}

    <button type="submit"
            style="width: 100%; padding: 12px; background-color: #9c6d5c; color: white; border: none; border-radius: 50px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-top: 8px;">
      登録する
    </button>
  </form>

  <form method="POST">
  {% csrf_token %}
  <style>
    input[type="text"],
    input[type="email"],
    input[type="password"] {
        width: 100%;
        padding: 12px 14px;
        border: 1px solid #ddd;
        border-radius: 10px !important;
        font-size: 0.95rem;
        box-sizing: border-box;
        outline: none;
    }
  </style>

  <div style="text-align: center; margin-top: 16px;">
    <a href="{% url 'accounts:login' %}" style="font-size: 0.85rem; color: #aaa; text-decoration: none;">
      ログイン画面に戻る
    </a>
  </div>

</div>
{% endblock %}
