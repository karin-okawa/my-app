{% extends "base.html" %}
{% block content %}
<div class="custom-phone-frame">
  <div class="p-4">

    <!-- ページタイトルと追加ボタンを横並びに表示 -->
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2 style="font-size: 1.1rem; font-weight: bold; color: #5d4037;">カテゴリー管理</h2>
      <!-- ＋追加ボタン：クリックでカテゴリー新規作成画面へ -->
      <a href="{% url 'households:category_create' %}" class="btn btn-sm" style="background-color: #9c6d5c; color: white; border-radius: 8px;">＋ 追加</a>
    </div>

    <!-- カテゴリーを1件ずつ繰り返し表示 -->
    {% for category in categories %}
    <div class="note-row d-flex align-items-center justify-content-between">
      <!-- カテゴリー名 -->
      <span style="font-weight: bold; color: #5d4037;">{{ category.name }}</span>
      <!-- 収入・支出の種別ラベル -->
      <span style="font-size: 0.8rem; color: #888; margin-left: 8px;">
        {% if category.category_type == 'income' %}収入{% else %}支出{% endif %}
      </span>
      <!-- 編集・削除ボタン -->
      <div class="d-flex gap-2 ms-auto">
        <a href="{% url 'households:category_edit' category.pk %}" style="color: #9c6d5c; text-decoration: none;">編集</a>
        <a href="{% url 'households:category_delete' category.pk %}" style="color: #d9534f; text-decoration: none;">削除</a>
      </div>
    </div>
    {% empty %}
    <!-- カテゴリーが1件もない場合のメッセージ -->
    <p style="color: #999; text-align: center;">カテゴリーがまだありません</p>
    {% endfor %}

    <!-- 収支入力画面に戻るリンク -->
    <div class="mt-4 text-center">
      <a href="{% url 'home:transaction_create' %}" style="color: #9c6d5c; text-decoration: none; font-size: 0.9rem;">← 収支入力に戻る</a>
    </div>

  </div>
</div>
{% endblock %}
