{% extends "base.html" %}

{% block title %}パスワード再設定 - かけいまもるくん{% endblock %}

{% block content %}
{% with hide_nav=True %}
<div class="page-center">
  <div class="card-box">

    <h1>パスワード再設定</h1>

    <p>
      パスワードを忘れた場合は、こちらから新しいパスワードを再設定できます。<br>
      ご登録のメールアドレスを入力してください。
    </p>

    <form method="POST">
      {% csrf_token %}

      <label for="id_email">メールアドレス</label>
      {{ form.email }}

      <button type="submit">送信</button>
    </form>

    <p>
      <a href="{% url 'accounts:login' %}">ログイン画面に戻る</a>
    </p>

  </div>
</div>
{% endwith %}
{% endblock %}
