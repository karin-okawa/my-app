{% extends "base.html" %} {# base.htmlを継承 #}

{% block content %}
<!-- メールアドレス変更完了画面 -->
<div style="padding: 32px 16px; text-align: center;">
  <h2 style="font-size: 1.1rem; font-weight: bold; color: #5d4037; margin-bottom: 16px;">メールアドレスの変更が完了しました</h2>
  <p style="font-size: 0.9rem; color: #555; margin-bottom: 24px;">再ログインしてください。</p>
  <!-- ログイン画面へのリンク -->
  <a href="{% url 'accounts:login' %}" style="color: #9c6d5c; text-decoration: underline; font-size: 0.9rem;">
    ログイン画面へ
  </a>
</div>
{% endblock %}
