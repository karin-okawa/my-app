{% extends "base.html" %} {# base.htmlを継承 #}

{% block content %}
<!-- 家計簿レポート投稿画面 -->
<div class="container mt-4" style="max-width: 600px;">
  <h2 class="mb-4" style="color: #5d4037; font-weight: bold; text-align: center;">家計簿レポートを投稿</h2>

  <!-- 投稿フォーム -->
  <form method="post" class="card p-4 shadow-sm" style="border-radius: 15px; border: none;">
    {% csrf_token %} {# CSRFトークン（セキュリティ対策） #}

    <!-- 対象年月の選択 -->
    <div class="row mb-3">
      <div class="col">
        <label class="form-label small text-muted">対象の年</label>
        {{ form.year }}
      </div>
      <div class="col">
        <label class="form-label small text-muted">対象の月</label>
        {{ form.month }}
      </div>
    </div>

    <!-- 収支タイプの選択（収入 or 支出） -->
    <div class="mb-4 text-center">
      <label class="form-label d-block small text-muted">どちらのデータを共有しますか？</label>
      <div class="d-flex justify-content-between gap-3">
        {% for radio in form.post_type %}
        <div class="flex-fill">
          {{ radio.tag }}
          <label class="btn btn-outline-custom w-100 py-2" for="{{ radio.id_for_label }}"
            style="border-radius: 12px;">
            {{ radio.choice_label }}
          </label>
        </div>
        {% endfor %}
      </div>
    </div>

    <!-- 世帯人数の選択 -->
    <div class="mb-3">
      <label class="form-label small text-muted">世帯人数</label>
      {{ form.household_size }}
    </div>

    <!-- メモ入力欄 -->
    <div class="mb-4">
      <label class="form-label small text-muted">一言メモ（工夫した点など）</label>
      {{ form.memo }}
    </div>

    <!-- 送信・キャンセルボタン -->
    <div class="d-grid gap-2">
      <!-- 二重送信防止：ボタンを押したら無効化する -->
      <button type="submit" class="btn btn-primary"
        style="background-color: #9c6d5c; border: none; padding: 12px; border-radius: 10px; font-weight: bold;"
        onclick="this.disabled=true; this.innerText='投稿中...'; this.form.submit();">
        家計簿を投稿する
      </button>
      <!-- キャンセルボタン（掲示板一覧へ戻る） -->
      <a href="{% url 'posts:post_list' %}" class="btn btn-link text-muted mt-2">キャンセル</a>
    </div>
  </form>
</div>

<style>
  /* フォームコントロールの共通デザイン */
  textarea, input[type="file"], select {
    border-radius: 12px !important;
    border: 1px solid #eee !important;
    padding: 10px !important;
    width: 100%;
  }
  /* フォーカス時のデザイン */
  textarea:focus, input:focus {
    border-color: #9c6d5c !important;
    box-shadow: 0 0 0 0.2rem rgba(156, 109, 92, 0.1) !important;
    outline: none;
  }
  /* プレースホルダーの色 */
  ::placeholder {
    color: #ccc;
  }
  /* 収入・支出切り替えボタンのスタイル */
  .btn-outline-custom {
    color: #9c6d5c !important;
    border: 2px solid #9c6d5c !important;
    border-top: 2px solid #9c6d5c !important;
    border-bottom: 2px solid #9c6d5c !important;
    border-left: 2px solid #9c6d5c !important;
    border-right: 2px solid #9c6d5c !important;
    font-weight: bold !important;
    border-radius: 12px !important;
  }
  /* 選択中のボタンのスタイル */
  .btn-check:checked + .btn-outline-custom {
    background-color: #9c6d5c !important;
    color: white !important;
  }
</style>

{% endblock %}
