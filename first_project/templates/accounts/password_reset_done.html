{% extends "base.html" %} {# base.htmlを継承 #}

{% block title %}メール送信完了 - かけいまもるくん{% endblock %} {# ページタイトルの設定 #}

{% block content %}
<!-- パスワードリセットメール送信完了画面 -->
<div style="display: flex; flex-direction: column; height: 100%; padding: 24px 20px; text-align: center;">

  <!-- 送信完了アイコン -->
  <div style="margin-top: 40px; margin-bottom: 32px;">
    <i class="bi bi-envelope-check" style="font-size: 3rem; color: #9c6d5c;"></i>
  </div>

  <h1 style="font-size: 1.3rem; font-weight: bold; color: #5d4037; margin-bottom: 16px;">
    メールを送信しました
  </h1>
  <p style="font-size: 0.85rem; color: #888; line-height: 1.8;">
    パスワード再設定用のメールを送信しました。<br>
    メール内のリンクから再設定を行ってください。
  </p>

  <!-- ログイン画面へ戻るリンク -->
  <div style="margin-top: 32px;">
    <a href="{% url 'accounts:login' %}" style="font-size: 0.85rem; color: #9c6d5c; text-decoration: none;">
      ログイン画面へ
    </a>
  </div>

</div>
{% endblock %}
