{% extends "base.html" %}

{% block title %}パスワード再設定 - かけいまもるくん{% endblock %}

{% block content %}
{% with hide_nav=True %}
<div class="page-center">
  <div class="card-box">

    <h1>新しいパスワード設定</h1>

    <p>
      新しいパスワードを入力してください。<br>
      同じパスワードを2回入力してください。
    </p>

    <form method="POST">
      {% csrf_token %}

      <label for="id_new_password1">新しいパスワード</label>
      {{ form.new_password1 }}

      <label for="id_new_password2">新しいパスワード（確認）</label>
      {{ form.new_password2 }}

      <button type="submit">パスワードを変更する</button>
    </form>

    <p>
      <a href="{% url 'accounts:login' %}">ログイン画面に戻る</a>
    </p>

  </div>
</div>
{% endwith %}
{% endblock %}
