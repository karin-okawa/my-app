<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    </head>
    <body>
        <nav class="navbar navbar-expand-lg navbar-light bg-light">
            <a class="navbar-brand" href="{% url 'home:home' %}">ホーム</a>
            {% if user.is_authenticated %}
            <a class="navbar-brand" href="{% url 'accounts:logout' %}">ログアウト</a>
            {% else %}
            <a class="navbar-brand" href="{% url 'accounts:login' %}">ログイン</a>
            <a class="navbar-brand" href="{% url 'accounts:regist' %}">ユーザー登録</a>
            {% endif %}
            {% comment %} <a class="navbar-brand" href="{% url 'accounts:user' %}">ユーザー画面</a> {% endcomment %}
        </nav>
        {% block content %}
        {% endblock %}
    </body>
</html>
