{% extends "base.html" %}
{% block title %}パスワード変更完了 - かけいまもるくん{% endblock %}

{% block content %}
<div style="display: flex; flex-direction: column; height: 100%; padding: 24px 20px; text-align: center;">

  <div style="margin-top: 40px; margin-bottom: 32px;">
    <i class="bi bi-check-circle" style="font-size: 3rem; color: #9c6d5c;"></i>
  </div>

  <h1 style="font-size: 1.3rem; font-weight: bold; color: #5d4037; margin-bottom: 16px;">
    パスワードの変更が完了しました
  </h1>

  <p style="font-size: 0.85rem; color: #888; line-height: 1.8;">
    新しいパスワードでログインしてください。
  </p>

  <div style="margin-top: 32px;">
    <a href="{% url 'accounts:login' %}"
       style="display: block; padding: 12px; background-color: #9c6d5c; color: white; border-radius: 50px; font-size: 1rem; font-weight: bold; text-decoration: none;">
      ログイン画面へ
    </a>
  </div>

</div>
{% endblock %}
