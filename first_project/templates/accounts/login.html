
{% extends "base.html" %}

{% block title %}ログイン - かけいまもるくん{% endblock %}

{% block content %}
{% with hide_nav=True %}
  <h1>かけいまもるくん</h1>

  <form method="POST">
      {% csrf_token %}

      {% if form.errors %}
          <p style="color:red;">{{ form.non_field_errors }}</p>
      {% endif %}


      <label for="email">メールアドレス</label>
      <input type="email" id="email" name="email" required>

      <label for="password">パスワード</label>
      <input type="password" id="password" name="password" required>

      <button type="submit">ログイン</button>
  </form>

  <p><a href="{% url 'accounts:regist' %}">新規アカウント登録</a></p>
  <p>パスワードを忘れた方は<a href="{% url 'accounts:password_reset' %}">こちら</a></p>
{% endwith %}
{% endblock %}
